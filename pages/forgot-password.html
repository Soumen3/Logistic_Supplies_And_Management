<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password — SwiftShip</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/assets/css/style.css" rel="stylesheet" />
  <script type="module" src="/js/forgot-password.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[var(--bg-page)]">
  <main class="max-w-lg w-full p-8 bg-white rounded-2xl shadow-xl">
    <a href="/index.html" class="inline-block text-sm text-amber-600 hover:underline mb-4">← Back to Home</a>
    <div class="flex items-center gap-4 mb-6">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#F59000,#FFAA1A);">
        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1C5.9 1 1 5.9 1 12s4.9 11 11 11 11-4.9 11-11S18.1 1 12 1zm0 20c-4.97 0-9-4.03-9-9s4.03-9 9-9 9 4.03 9 9-4.03 9-9 9zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 9 15.5 9 14 9.67 14 10.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 9 8.5 9 7 9.67 7 10.5 7.67 12 8.5 12zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      </div>
      <div>
        <h1 class="text-2xl font-display font-700" style="color:var(--text-head);">Reset Password</h1>
        <p class="text-sm" style="color:var(--text-muted);">Use your recovery code to reset your password</p>
      </div>
    </div>

    <form id="forgot-password-form" class="space-y-4" novalidate>
      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Email Address</label>
        <input id="email" type="email" required class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm focus:outline-none focus:ring-2" style="border-color:var(--border);focus:ring-color:var(--accent);" placeholder="your@email.com" />
      </div>

      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Recovery Code</label>
        <input id="recovery_code" type="text" required class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm focus:outline-none focus:ring-2" style="border-color:var(--border);focus:ring-color:var(--accent);" placeholder="Enter recovery code (e.g., ABC12345)" />
        <p class="text-xs mt-1" style="color:var(--text-muted);">You received this code during registration</p>
      </div>

      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">New Password</label>
        <input id="password" type="password" required minlength="6" class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm focus:outline-none focus:ring-2" style="border-color:var(--border);focus:ring-color:var(--accent);" placeholder="Create a new password" />
        <p class="text-xs mt-1" style="color:var(--text-muted);">Must be at least 6 characters</p>
      </div>

      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Confirm Password</label>
        <input id="password_confirm" type="password" required minlength="6" class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm focus:outline-none focus:ring-2" style="border-color:var(--border);focus:ring-color:var(--accent);" placeholder="Confirm password" />
      </div>

      <div class="pt-2">
        <button type="submit" class="w-full px-4 py-3 rounded-lg text-white font-medium" style="background:linear-gradient(135deg,#F59000,#FFAA1A);transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">Reset Password</button>
      </div>

      <p id="msg" class="text-sm mt-2 text-center"></p>

      <p class="text-center text-sm mt-4" style="color:var(--text-muted);">Remember your password? <a href="/pages/login.html" class="text-amber-600 hover:underline font-medium">Sign in</a></p>
    </form>
  </main>
</body>
</html>
