<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register — SwiftShip</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/assets/css/style.css" rel="stylesheet" />
  <script type="module" src="/js/register.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[var(--bg-page)]">
  <main class="max-w-lg w-full p-8 bg-white rounded-2xl shadow-xl">
    <a href="/index.html" class="inline-block text-sm text-amber-600 hover:underline mb-4">← Back to Home</a>
    <div class="flex items-center gap-4 mb-6">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#F59000,#FFAA1A);">
        <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20 21H4l-2-7h20l-2 7zM4.5 12l1.5-6h12l1.5 6H4.5zM9 6V4h6v2H9z"/></svg>
      </div>
      <div>
        <h1 class="text-2xl font-display font-700" style="color:var(--text-head);">Create your account</h1>
        <p class="text-sm" style="color:var(--text-muted);">Sign up to start creating shipments and tracking in real-time.</p>
      </div>
    </div>

    <form id="register-form" class="space-y-4" novalidate>
      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Full name</label>
        <input id="full_name" required class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-amber-200" placeholder="Your full name" />
      </div>

      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Phone</label>
        <input id="phone" type="tel" required pattern="[0-9+\- ()]{7,}" class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm" placeholder="+1 555 555 5555" />
      </div>

      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Email</label>
        <input id="email" type="email" required class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm" placeholder="you@company.com" />
      </div>

      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Password</label>
        <input id="password" type="password" required minlength="6" class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm" placeholder="Create a password" />
      </div>

      <div>
        <label class="block text-sm font-medium" style="color:var(--text-head);">Confirm password</label>
        <input id="password_confirm" type="password" required minlength="6" class="mt-1 block w-full px-4 py-3 border rounded-lg shadow-sm" placeholder="Re-enter your password" />
      </div>

      <div class="pt-2">
        <button type="submit" class="w-full px-4 py-3 rounded-lg text-white" style="background:linear-gradient(135deg,#F59000,#FFAA1A);">Create account</button>
      </div>

      <p id="msg" class="text-sm mt-2 text-center"></p>

      <p class="text-center text-sm mt-4" style="color:var(--text-muted);">Already registered? <a href="login.html" class="text-amber-600">Sign in</a></p>
    </form>

    <!-- Recovery Codes Section (shown after registration) -->
    <div id="recovery-codes-section" class="hidden p-6 rounded-lg" style="background:#f0fdf4;border:1px solid #86efac;">
      <div class="mb-4">
        <h2 class="text-lg font-display font-700" style="color:#15803d;">Save Your Recovery Codes</h2>
        <p class="text-sm mt-1" style="color:#166534;">Store these codes somewhere safe. You'll need one to reset your password if you forget it.</p>
      </div>

      <div id="recovery-codes-list" class="bg-white p-4 rounded-lg mb-4 border border-gray-200 font-mono text-sm space-y-2">
        <!-- Codes will be inserted here -->
      </div>

      <div class="flex gap-2">
        <button id="copy-codes-btn" type="button" class="flex-1 px-3 py-2 rounded-lg text-white text-sm" style="background:#10b981;">Copy All</button>
        <button id="download-codes-btn" type="button" class="flex-1 px-3 py-2 rounded-lg text-white text-sm" style="background:#0ea5e9;">Download</button>
      </div>

      <div class="mt-4 p-3 rounded-lg text-sm" style="background:#fef3c7;border:1px solid #fcd34d;">
        <p style="color:#92400e;">⚠️ Save these codes now. You won't see them again.</p>
      </div>

      <button id="continue-login-btn" type="button" class="w-full mt-4 px-4 py-3 rounded-lg text-white" style="background:linear-gradient(135deg,#F59000,#FFAA1A);">Continue to Login</button>
    </div>
  </main>

</body>
</html>
