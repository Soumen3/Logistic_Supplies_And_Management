<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Staff — SwiftShip</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link href="/assets/css/style.css" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { display: ['Syne', 'sans-serif'], body: ['DM Sans', 'sans-serif'] } } }
    };
  </script>

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #1a1f2e;
      color: #e8edf5;
    }

    .glass-panel {
      background: rgba(26, 31, 46, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-topbar {
      background: rgba(26, 31, 46, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      border-color: rgba(245, 144, 0, 0.2);
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #9baac4;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: #F59000;
      background: rgba(245, 144, 0, 0.1);
      border-right: 3px solid #F59000;
    }

    .btn-gradient {
      background: linear-gradient(135deg, #F59000, #FFAA1A);
      box-shadow: 0 4px 15px rgba(245, 144, 0, 0.3);
      transition: all 0.2s;
    }

    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(245, 144, 0, 0.4);
    }

    /* Ambient background orbs */
    .bg-orb-1 {
      position: fixed;
      top: -100px;
      left: 100px;
      width: 500px;
      height: 500px;
      background: #F59000;
      filter: blur(150px);
      opacity: 0.05;
      pointer-events: none;
    }

    .bg-orb-2 {
      position: fixed;
      bottom: -50px;
      right: -50px;
      width: 400px;
      height: 400px;
      background: #2E4F93;
      filter: blur(120px);
      opacity: 0.08;
      pointer-events: none;
    }
  </style>

  <script type="module" src="/js/admin-create-staff.js"></script>

<style>
    body { font-family: 'DM Sans', sans-serif; background: #1a1f2e; }

    .reg-panel-left {
      position: relative;
      background: linear-gradient(160deg, #0d1224 0%, #1a2040 60%, #0d1224 100%);
      overflow: hidden;
    }
    .reg-panel-left::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,144,0,0.13) 1px, transparent 1px);
      background-size: 30px 30px;
      animation: grid-shift 14s linear infinite;
    }
    @keyframes grid-shift { 100% { transform: translate(30px,30px); } }

    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }

    /* Card */
    .reg-card {
      background: rgba(30,36,58,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    /* Input */
    .reg-input {
      width: 100%; padding: 0.72rem 1rem;
      border-radius: 0.75rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: #e8edf5; font-size: 0.875rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .reg-input::placeholder { color: #4e6080; }
    .reg-input:focus { border-color: #F59000; box-shadow: 0 0 0 3px rgba(245,144,0,0.18); }
    .reg-input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }

    /* Password strength bar */
    .strength-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 0.4s ease, background 0.4s ease; }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #4e6080; padding: 0;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: #F59000; }

    /* Submit btn */
    .btn-submit {
      width: 100%; padding: 0.875rem; border-radius: 0.875rem;
      font-weight: 600; font-size: 0.95rem; color: #fff;
      background: linear-gradient(135deg,#F59000,#FFAA1A);
      box-shadow: 0 6px 24px rgba(245,144,0,0.35);
      border: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .btn-submit::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0.15); opacity: 0; transition: opacity 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,144,0,0.45); }
    .btn-submit:hover::after { opacity: 1; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Label */
    .label-text { display: block; font-size: 0.78rem; font-weight: 500; margin-bottom: 0.4rem; color: #9baac4; }

    /* Shake */
    @keyframes shake {
      0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-8px); }
      40%{ transform:translateX(8px); } 60%{ transform:translateX(-5px); } 80%{ transform:translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body class="min-h-screen relative overflow-x-hidden flex">

  <!-- Ambient Orbs -->
  <div class="bg-orb-1"></div>
  <div class="bg-orb-2"></div>

  <!-- ── SIDEBAR (Desktop: fixed left, Mobile: hidden / slide-in) ── -->
  <aside id="sidebar"
    class="fixed inset-y-0 left-0 z-50 w-64 glass-panel transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">

    <!-- Logo Area -->
    <div class="h-16 flex items-center px-6 border-b border-white/10">
      <a href="/" class="flex items-center gap-3 group">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center btn-gradient">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M20 21H4l-2-7h20l-2 7zM4.5 12l1.5-6h12l1.5 6H4.5zM9 6V4h6v2H9z" />
          </svg>
        </div>
        <span class="font-display text-lg font-700 tracking-tight text-white">
          Swift<span style="color:#F59000;">Ship</span>
        </span>
      </a>
      <button id="close-sidebar" class="ml-auto lg:hidden text-white/50 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Navigation Links -->
    <nav class="flex-1 py-6 flex flex-col gap-1">
      <a href="/pages/admin/dashboard.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
          </path>
        </svg>
        Dashboard
      </a>
      <a href="/pages/admin/create-staff.html" class="px-6 py-3 text-sm font-600 nav-link active">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
        </svg>
        Add Staff
      </a>
      <a href="/pages/admin/manage-staff.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
        Manage Staff
      </a>
      <a href="/pages/admin/users.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        Users
      </a>
      <a href="/pages/admin/shipments.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
        </svg>
        Shipments
      </a>
      <a href="/pages/admin/reports.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 10h10M4 14h16M4 18h7"></path>
        </svg>
        Reports
      </a>
    </nav>

    <!-- User Section -->
    <div class="p-6 border-t border-white/10">
      <div class="mb-4">
        <div id="user-greeting" class="text-sm font-600 text-white">Welcome!</div>
        <div id="user-name" class="text-xs" style="color:#9baac4;">Admin</div>
      </div>
      <button id="logout-btn"
        class="w-full py-2 rounded-xl text-sm font-600 text-white btn-gradient flex justify-center items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Overlay for mobile sidebar -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity">
  </div>

  <!-- ── MAIN CONTENT WRAPPER ── -->
  <div class="flex-1 flex flex-col lg:ml-64 min-h-screen relative z-10">

    <!-- Mobile Topbar -->
    <header class="lg:hidden h-16 glass-topbar flex items-center justify-between px-6 sticky top-0 z-30">
      <a href="/" class="flex items-center gap-2 group">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center btn-gradient">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M20 21H4l-2-7h20l-2 7zM4.5 12l1.5-6h12l1.5 6H4.5zM9 6V4h6v2H9z" />
          </svg>
        </div>
        <span class="font-display text-lg font-700 tracking-tight text-white">Swift<span
            style="color:#F59000;">Ship</span></span>
      </a>
      <button id="mobile-menu-toggle" class="p-2 -mr-2 text-white/70 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </header>

    <!-- Main Content Area -->
    <main class="p-6 md:p-10 max-w-7xl w-full mx-auto">
<div class="max-w-4xl mx-auto pt-4 flex justify-center">
<div class="reg-card rounded-2xl p-8 w-full max-w-md relative z-10">

      <!-- Header -->
      <div class="mb-6">
        <h1 class="font-display text-2xl font-700 mb-1" style="color:#e8edf5;">Create Staff User 🏢</h1>
        <p class="text-sm" style="color:#6b7fa0;">Add a new staff member to the system.</p>
      </div>

      <!-- Form -->
      <form id="create-staff-form" class="space-y-4" novalidate>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Full Name -->
          <div>
            <label for="full_name" class="label-text">Staff Full Name</label>
            <input id="full_name" type="text" required autocomplete="name"
              class="reg-input" placeholder="Staff member name" />
            <p id="error_full_name" class="text-xs mt-1 hidden" style="color:#ef4444;"></p>
          </div>

          <!-- Phone -->
          <div>
            <label for="phone" class="label-text">Phone number</label>
            <input id="phone" type="tel" required
              class="reg-input" placeholder="+1 555 000 0000" />
            <p id="error_phone" class="text-xs mt-1 hidden" style="color:#ef4444;"></p>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="label-text">Email address</label>
          <input id="email" type="email" required autocomplete="email"
            class="reg-input" placeholder="staff@company.com" />
          <p id="error_email" class="text-xs mt-1 hidden" style="color:#ef4444;"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Password -->
          <div>
            <label for="password" class="label-text">Password</label>
            <div class="relative">
              <input id="password" type="password" required minlength="6" autocomplete="new-password"
                class="reg-input pr-11" placeholder="Min 6 chars" />
              <button type="button" id="toggle-pw" class="pw-toggle" aria-label="Toggle password">
                <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <!-- Strength bar -->
            <div class="mt-2 strength-bar">
              <div id="strength-fill" class="strength-fill"></div>
            </div>
            <p id="strength-label" class="text-xs mt-1" style="color:#4e6080;"></p>
            <p id="error_password" class="text-xs mt-1 hidden" style="color:#ef4444;"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="password_confirm" class="label-text">Confirm password</label>
            <div class="relative">
              <input id="password_confirm" type="password" required minlength="6" autocomplete="new-password"
                class="reg-input pr-11" placeholder="Re-enter password" />
              <button type="button" id="toggle-pw2" class="pw-toggle" aria-label="Toggle confirm password">
                <svg id="eye-icon2" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
            <p id="match-label" class="text-xs mt-1 hidden"></p>
            <p id="error_password_confirm" class="text-xs mt-1 hidden" style="color:#ef4444;"></p>
          </div>
        </div>

        <!-- Error message -->
        <p id="msg" class="text-xs text-center hidden py-2 px-3 rounded-lg"
          style="background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);"></p>

        <!-- Submit -->
        <button id="submit-btn" type="submit" class="btn-submit mt-4">
          <span id="btn-text">Create Staff User</span>
        </button>

      </form>
    </div>
</div>
</main>
</div>
<script>
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const toggleBtn = document.getElementById('mobile-menu-toggle');
  const closeBtn = document.getElementById('close-sidebar');

  function toggleSidebar() {
    sidebar?.classList.toggle('-translate-x-full');
    overlay?.classList.toggle('hidden');
  }

  toggleBtn?.addEventListener('click', toggleSidebar);
  closeBtn?.addEventListener('click', toggleSidebar);
  overlay?.addEventListener('click', toggleSidebar);
</script>

</body>
</html>
