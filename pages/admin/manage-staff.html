<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Staff — SwiftShip</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { display: ['Syne', 'sans-serif'], body: ['DM Sans', 'sans-serif'] } } }
    };
  </script>

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #1a1f2e;
      color: #e8edf5;
    }

    .glass-panel {
      background: rgba(26, 31, 46, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-topbar {
      background: rgba(26, 31, 46, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: box-shadow 0.2s;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #9baac4;
      transition: all 0.2s;
    }

    .nav-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: #F59000;
      background: rgba(245, 144, 0, 0.1);
      border-right: 3px solid #F59000;
    }

    .btn-gradient {
      background: linear-gradient(135deg, #F59000, #FFAA1A);
      box-shadow: 0 4px 15px rgba(245, 144, 0, 0.3);
      transition: all 0.2s;
    }

    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(245, 144, 0, 0.4);
    }

    /* Ambient background orbs */
    .bg-orb-1 {
      position: fixed;
      top: -100px;
      left: 100px;
      width: 500px;
      height: 500px;
      background: #F59000;
      filter: blur(150px);
      opacity: 0.05;
      pointer-events: none;
    }

    .bg-orb-2 {
      position: fixed;
      bottom: -50px;
      right: -50px;
      width: 400px;
      height: 400px;
      background: #2E4F93;
      filter: blur(120px);
      opacity: 0.08;
      pointer-events: none;
    }

    /* ── TABLE RESPONSIVE FIX ── */

    /* The card must NOT clip the scrollable child */
    .table-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      /* overflow: hidden is intentionally NOT set here — it would break sticky and scroll */
    }

    /* Scroll wrapper fills the card and scrolls horizontally */
    .table-scroll-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 1rem;        /* visually clips table corners */
      /* Subtle scrollbar on WebKit */
      scrollbar-width: thin;
      scrollbar-color: rgba(245, 144, 0, 0.4) transparent;
    }

    .table-scroll-wrapper::-webkit-scrollbar {
      height: 4px;
    }
    .table-scroll-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }
    .table-scroll-wrapper::-webkit-scrollbar-thumb {
      background: rgba(245, 144, 0, 0.4);
      border-radius: 2px;
    }

    /* Table itself never shrinks below a comfortable minimum */
    .staff-table {
      width: 100%;
      min-width: 560px;   /* triggers scroll on narrow viewports */
      border-collapse: collapse;
      text-align: left;
    }

    .staff-table thead {
      background: rgba(255, 255, 255, 0.05);
    }

    .staff-table th {
      padding: 0.875rem 1.5rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .staff-table td {
      padding: 0.875rem 1.5rem;
      font-size: 0.875rem;
      white-space: nowrap;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .staff-table tr:last-child td {
      border-bottom: none;
    }

    .staff-table tbody tr {
      transition: background 0.15s;
    }

    .staff-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    /* Hint for users that the table scrolls (mobile only) */
    @media (max-width: 640px) {
      .scroll-hint {
        display: flex;
      }
    }

    .scroll-hint {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: #9baac4;
      margin-bottom: 0.5rem;
    }
  </style>

  <script type="module" src="/js/admin-manage-staff.js"></script>
</head>
<body class="min-h-screen relative overflow-x-hidden flex">

  <!-- Ambient Orbs -->
  <div class="bg-orb-1"></div>
  <div class="bg-orb-2"></div>

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar"
    class="fixed inset-y-0 left-0 z-50 w-64 glass-panel transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">

    <div class="h-16 flex items-center px-6 border-b border-white/10">
      <a href="/" class="flex items-center gap-3 group">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center btn-gradient">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M20 21H4l-2-7h20l-2 7zM4.5 12l1.5-6h12l1.5 6H4.5zM9 6V4h6v2H9z" />
          </svg>
        </div>
        <span class="font-display text-lg font-700 tracking-tight text-white">
          Swift<span style="color:#F59000;">Ship</span>
        </span>
      </a>
      <button id="close-sidebar" class="ml-auto lg:hidden text-white/50 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <nav class="flex-1 py-6 flex flex-col gap-1">
      <a href="/pages/admin/dashboard.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
          </path>
        </svg>
        Dashboard
      </a>
      <a href="/pages/admin/create-staff.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
        </svg>
        Add Staff
      </a>
      <a href="/pages/admin/manage-staff.html" class="px-6 py-3 text-sm font-600 nav-link active">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
        Manage Staff
      </a>
      <a href="/pages/admin/shipments.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
        </svg>
        Shipments
      </a>
      <a href="/pages/admin/reports.html" class="px-6 py-3 text-sm font-600 nav-link">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 10h10M4 14h16M4 18h7"></path>
        </svg>
        Reports
      </a>
    </nav>

    <div class="p-6 border-t border-white/10">
      <div class="mb-4">
        <div id="user-greeting" class="text-sm font-600 text-white">Welcome!</div>
        <div id="user-name" class="text-xs" style="color:#9baac4;">Admin</div>
      </div>
      <button id="logout-btn"
        class="w-full py-2 rounded-xl text-sm font-600 text-white btn-gradient flex justify-center items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div id="sidebar-overlay"
    class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity"></div>

  <!-- ── MAIN CONTENT ── -->
  <div class="flex-1 flex flex-col lg:ml-64 min-h-screen relative z-10">

    <!-- Mobile Topbar -->
    <header class="lg:hidden h-16 glass-topbar flex items-center justify-between px-4 sticky top-0 z-30">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center btn-gradient">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M20 21H4l-2-7h20l-2 7zM4.5 12l1.5-6h12l1.5 6H4.5zM9 6V4h6v2H9z" />
          </svg>
        </div>
        <span class="font-display text-lg font-700 tracking-tight text-white">
          Swift<span style="color:#F59000;">Ship</span>
        </span>
      </a>
      <button id="mobile-menu-toggle" class="p-2 -mr-2 text-white/70 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </header>

    <!-- Page Content -->
    <main class="p-4 sm:p-6 md:p-10 w-full max-w-7xl mx-auto">
      <div class="pt-4">

        <h1 class="font-display text-3xl sm:text-4xl font-800 mb-1" style="color:#fff;">Manage Staff</h1>
        <p class="text-base sm:text-lg mb-6" style="color:#9baac4;">View and manage staff accounts</p>

        <!-- Scroll hint (visible on mobile only) -->
        <div class="scroll-hint">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"></path>
          </svg>
          Scroll sideways to see all columns
        </div>

        <!-- Table card — no overflow:hidden so scroll works -->
        <div class="table-card">
          <div class="table-scroll-wrapper">
            <table class="staff-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th style="text-align:center;">Actions</th>
                </tr>
              </thead>
              <tbody id="staff-list"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Sidebar toggle script -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const toggleBtn = document.getElementById('mobile-menu-toggle');
    const closeBtn = document.getElementById('close-sidebar');

    function toggleSidebar() {
      sidebar?.classList.toggle('-translate-x-full');
      overlay?.classList.toggle('hidden');
    }

    toggleBtn?.addEventListener('click', toggleSidebar);
    closeBtn?.addEventListener('click', toggleSidebar);
    overlay?.addEventListener('click', toggleSidebar);
  </script>

  <!-- Data / auth script -->
  <script type="module">
    import { SwiftShipDB } from '/js/db.module.js';

    function el(id) { return document.getElementById(id); }

    async function redirectIfNotAdmin() {
      const session = await SwiftShipDB.getActiveSession();
      if (!session || (session.role !== 'admin' && session.role !== 1)) {
        window.location.href = '/pages/login.html';
        return true;
      }
      return false;
    }

    async function loadStaff() {
      const listEl = el('staff-list');
      if (!listEl) return;

      const users = await SwiftShipDB.db.users.toArray();
      const staff = users.filter(u => (u.role || '').toLowerCase().trim() === 'staff');

      if (!staff.length) {
        listEl.innerHTML = `
          <tr>
            <td colspan="4" style="padding:2rem 1.5rem; text-align:center; color:#9baac4;">
              No staff found
            </td>
          </tr>`;
        return;
      }

      listEl.innerHTML = staff.map(user => `
        <tr>
          <td>${user.full_name}</td>
          <td>${user.email}</td>
          <td>${user.phone}</td>
          <td style="text-align:center;">
            <button data-id="${user.id}" class="delete-btn"
              style="background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3);
                     padding:0.3rem 0.85rem; border-radius:0.5rem; font-size:0.8rem; font-weight:600;
                     cursor:pointer; transition:background 0.15s;"
              onmouseover="this.style.background='rgba(239,68,68,0.3)'"
              onmouseout="this.style.background='rgba(239,68,68,0.15)'">
              Delete
            </button>
          </td>
        </tr>
      `).join('');

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = Number(btn.getAttribute('data-id'));
          if (confirm('Delete this staff member?')) {
            await SwiftShipDB.db.users.delete(id);
            loadStaff();
          }
        });
      });
    }

    function setupLogout() {
      el('logout-btn')?.addEventListener('click', async () => {
        await SwiftShipDB.deactivateActiveSessions();
        window.location.href = '/pages/login.html';
      });
    }

    async function init() {
      const blocked = await redirectIfNotAdmin();
      if (blocked) return;
      setupLogout();
      loadStaff();
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
